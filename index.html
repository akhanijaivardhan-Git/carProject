<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porsche Taycan Turbo S</title>

    

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    color:#fff;
}
/* ===== Navbar ===== */

.navbar{
    width:100%;
    height:80px;
    position:absolute;
    top:0;
    left:0;
    z-index:1000;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 60px;
}

.logo img{
    width: 60px;
}

.nav-links{
    display:flex;
    gap:80px;
}

.nav-links a{
    color:#fff;
    text-decoration:none;
    font-size:25px;
    transition:.3s;
}

.nav-links a:hover,
.nav-links .active{
    color:#fff;
    font-weight:bold;
}

.cart{
    color:#fff;
    font-size:22px;
    cursor:pointer;
}

.hero{
    width:100%;
    height:100vh;
    position:relative;
    overflow:hidden;
    background:linear-gradient(to bottom,#0b0b0b,#1a1a1a,#000);
}

/* Text */

.content{
    text-align:center;
    padding-top:80px;
    position:relative;
    z-index:2;
}

.small-title{
    color:#bdbdbd;
    letter-spacing:4px;
    font-size:14px;
    text-transform:uppercase;
}

.content h1{
    font-size:70px;
    margin:15px 0;
    font-weight:700;
}

.price{
    color:#d9d9d9;
    font-size:22px;
}

/* Car */

.car{
    width:100%;
    display:flex;
    justify-content:center;
    margin-top:40px;
    position:relative;
    z-index:2;
}

.car img{
    width:900px;
    max-width:90%;
}

/* Arrows */

.left-btn,
.right-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    background:white;
    color:black;
    cursor:pointer;
    font-size:20px;
    z-index:5;
}

.left-btn{
    left:40px;
}

.right-btn{
    right:40px;
}

/* Bottom */

.bottom{
    width:100%;
    position:absolute;
    bottom:40px;
    display:flex;
    justify-content:center;
    gap:150px;
    z-index:2;
}

.box{
    text-align:center;
}

.box h2{
    font-size:45px;
    margin-bottom:10px;
}

.box p{
    color:#bfbfbf;
    font-size:15px;
}
    </style>
</head>
<body>
    <header class="navbar">

    <div class="logo">
        <img src="mi-removebg-preview.png" alt="Logo">
    </div>

    <nav class="nav-links">
        <a href="#" class="active">Home</a>
        <a href="#">Shop</a>
        <a href="#">Dealer</a>
        <a href="#">More</a>
    </nav>

    <div class="cart">
        🛍
    </div>

</header>

<section class="hero">

    <div class="overlay"></div>

    <div class="content">

        <p class="small-title">SPORT TURISMO</p>

        <h1>Taycan Turbo S</h1>

        <p class="price">From $187,400*</p>

    </div>

    <button class="left-btn">
        <i class="fa-solid fa-chevron-left"></i>
    </button>

    <button class="right-btn">
        <i class="fa-solid fa-chevron-right"></i>
    </button>

    <div class="car">

        <img src="car2-removebg-preview.png" alt="Car">

    </div>

    <div class="bottom">

        <div class="box">
            <h2>357 KM</h2>
            <p>Driving Range</p>
        </div>

        <div class="box">
            <h2>750 hp</h2>
            <p>Overboost Power</p>
        </div>

        <div class="box">
            <h2>2.6 s</h2>
            <p>0-100 km/h</p>
        </div>

    </div>

</section>

</body>
</html>
